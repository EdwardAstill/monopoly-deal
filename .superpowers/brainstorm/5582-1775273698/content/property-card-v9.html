<h2>Wild Card — v9</h2>
<p class="subtitle">Precisely aligned columns.</p>

<style>
  .card-row { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
  .card-label { text-align: center; font-size: 12px; color: #aaa; margin-top: 8px; }
  .card-group { display: flex; flex-direction: column; align-items: center; }
</style>

<div class="card-row">
  <div class="card-group">
    <!--
      Layout:
        Card: 120x162, rx=5
        Top band: y=1..39
        Bottom band: y=123..161
        Body: y=39..123  (84px)
        Badge: cx=22, cy=43, r=14

        Table area: y=52..122
          RENT label: y=61
          Col divider line: y=65
          Label col: x=10..61
          Orange col: x=62..88  center=75
          Pink col:   x=90..116 center=103
          Rows (text baseline): 76, 87, 98, 109, 119
          Dashed separator after Full set: y=102
    -->
    <svg width="120" height="162" viewBox="0 0 120 162" xmlns="http://www.w3.org/2000/svg">
      <defs><clipPath id="cw9"><rect x="1" y="1" width="118" height="160" rx="5" ry="5"/></clipPath></defs>

      <!-- Card base -->
      <rect x="1" y="1" width="118" height="160" rx="5" ry="5" fill="#fff9f4" stroke="#bbb" stroke-width="1.5"/>

      <!-- Top band -->
      <rect x="1" y="1" width="118" height="39" fill="#f57c00" clip-path="url(#cw9)"/>
      <text x="60" y="27" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="13" fill="white">WILD CARD</text>

      <!-- Bottom band -->
      <rect x="1" y="123" width="118" height="39" fill="#d81b60" clip-path="url(#cw9)"/>
      <g transform="rotate(180,60,142.5)">
        <text x="60" y="138" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="13" fill="white">WILD CARD</text>
      </g>

      <!-- Badge -->
      <circle cx="22" cy="43" r="14" fill="white" stroke="#c0392b" stroke-width="2.5"/>
      <text x="22" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a1a1a">$2</text>

      <!-- RENT label -->
      <text x="14" y="61" font-family="Arial,sans-serif" font-size="9" fill="#444" letter-spacing="1">RENT</text>

      <!-- Column background rects — orange x=62..88, pink x=90..116, rows y=65..122 -->
      <rect x="62" y="65" width="27" height="57" fill="#f57c00" opacity="0.2" rx="2"/>
      <rect x="91" y="65" width="27" height="57" fill="#d81b60" opacity="0.2" rx="2"/>

      <!-- Horizontal rule under header -->
      <line x1="10" y1="65" x2="118" y2="65" stroke="#ccc" stroke-width="1"/>

      <!-- Row 1: 1 card  y=76 -->
      <text x="14" y="76" font-family="Arial,sans-serif" font-size="9" fill="#555">1 card</text>
      <text x="75" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$1</text>
      <text x="104" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$1</text>

      <!-- Row 2: 2 cards  y=87 -->
      <text x="14" y="87" font-family="Arial,sans-serif" font-size="9" fill="#555">2 cards</text>
      <text x="75" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$2</text>
      <text x="104" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$2</text>

      <!-- Row 3: Full set  y=98 -->
      <text x="14" y="98" font-family="Arial,sans-serif" font-size="9" fill="#555">Full set</text>
      <text x="75" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$3</text>
      <text x="104" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1a1a1a">$4</text>

      <!-- Dashed separator -->
      <line x1="10" y1="102" x2="118" y2="102" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4,3"/>

      <!-- Row 4: + House  y=111 -->
      <text x="14" y="111" font-family="Arial,sans-serif" font-size="8.5" fill="#888">+ House</text>
      <text x="75" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#1a1a1a">$4</text>
      <text x="104" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#1a1a1a">$5</text>

      <!-- Row 5: + Hotel  y=121 -->
      <text x="14" y="121" font-family="Arial,sans-serif" font-size="8.5" fill="#888">+ Hotel</text>
      <text x="75" y="121" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#1a1a1a">$5</text>
      <text x="104" y="121" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#1a1a1a">$6</text>
    </svg>
    <div class="card-label">Wild Property</div>
  </div>
</div>

<p class="subtitle">Say "locked" to approve wild card and move to money cards.</p>
